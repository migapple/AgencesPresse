<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Agences de Presse</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IM+Fell+English&display=swap">
<style>
:root{
  --fs:1;
  --bg:#070510;
  --bg2:#120b1f;
  --bg3:#1c1330;
  --gold:#c9a961;
  --gold2:#e8d2a0;
  --line:rgba(201,169,97,0.16);
  --gold-dim:rgba(201,169,97,0.35);
  --text:#ece4d6;
  --dim:#8f87a3;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'IM Fell English',serif;color:var(--text);font-size:calc(16px * var(--fs));}
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}

/* header */
.header{padding:calc(14px + env(safe-area-inset-top)) 16px 12px;background:var(--bg);flex-shrink:0;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.header h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:calc(22px * var(--fs));letter-spacing:0.5px;color:var(--gold2);}
.header-actions{display:flex;gap:8px;flex-shrink:0;}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--bg2);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;}

/* search */
.search-wrap{position:relative;margin:10px 16px 0;display:none;flex-shrink:0;}
.search-wrap.active{display:block;}
.search-wrap input{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 36px 10px 12px;color:var(--text);font-family:inherit;font-size:calc(15px * var(--fs));outline:none;}
.search-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;background:var(--bg3);border:none;color:var(--dim);display:none;align-items:center;justify-content:center;font-size:12px;cursor:pointer;}

/* chips */
.chips{display:flex;gap:8px;padding:10px 16px 4px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:var(--bg2);color:var(--dim);font-size:calc(13px * var(--fs));font-family:'Cormorant Garamond',serif;cursor:pointer;white-space:nowrap;}
.chip.active{border-color:var(--gold);color:var(--gold2);background:var(--bg3);}

/* main */
.main{flex:1;position:relative;overflow-y:auto;padding:6px 16px calc(12px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch;}
.main.flush{overflow:hidden;padding:0;}
.view{display:none;}
.view.active{display:block;}

/* list */
.card{border:1px solid var(--line);background:var(--bg2);border-radius:14px;padding:14px;margin-top:10px;display:flex;gap:12px;align-items:center;cursor:pointer;}
.card-media{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.card-thumb{width:44px;height:44px;border-radius:10px;object-fit:cover;display:block;background:var(--bg3);border:1px solid var(--line);}
.card-thumb-ph{width:44px;height:44px;border-radius:10px;background:var(--bg3);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;opacity:0.5;}
.card-flag{font-size:24px;line-height:1;flex-shrink:0;}
.card-info{flex:1;min-width:0;}
.card-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:calc(17px * var(--fs));color:var(--gold2);}
.card-meta{font-size:calc(13px * var(--fs));color:var(--dim);margin-top:2px;}
.card-arrow{color:var(--gold);opacity:0.6;font-size:18px;}
.empty{text-align:center;color:var(--dim);padding:40px 10px;font-family:'Cormorant Garamond',serif;font-size:calc(16px * var(--fs));}

/* detail */
.back-btn{background:none;border:none;color:var(--gold);font-size:calc(15px * var(--fs));font-family:'Cormorant Garamond',serif;cursor:pointer;padding:10px 0 12px;display:flex;align-items:center;gap:4px;}
.detail-img{width:100%;height:180px;border-radius:14px;background:linear-gradient(135deg,var(--bg3),var(--bg2));display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:6px;border:1px solid var(--line);}
.detail-img img{width:100%;height:100%;object-fit:cover;}
.detail-img .ph{font-size:42px;opacity:0.3;}
.img-note{font-size:calc(11px * var(--fs));color:var(--dim);opacity:0.6;margin-bottom:14px;font-family:'Cormorant Garamond',serif;}
.detail-title{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:calc(26px * var(--fs));color:var(--gold2);margin-bottom:4px;line-height:1.2;}
.detail-sub{font-size:calc(14px * var(--fs));color:var(--dim);margin-bottom:14px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.detail-stat{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
.detail-stat .lbl{font-size:calc(11px * var(--fs));color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;}
.detail-stat .val{font-family:'Cormorant Garamond',serif;font-size:calc(16px * var(--fs));color:var(--gold2);margin-top:2px;}
.detail-fact{font-size:calc(15px * var(--fs));line-height:1.6;color:var(--text);background:var(--bg2);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:14px;}
.detail-map-btn{display:block;width:100%;padding:12px;border-radius:10px;border:1px solid var(--gold-dim);background:var(--bg2);color:var(--gold2);font-family:'Cormorant Garamond',serif;font-size:calc(15px * var(--fs));text-align:center;cursor:pointer;margin-bottom:24px;}

/* map */
#view-map{position:absolute;top:0;left:0;right:0;bottom:0;}
#map{width:100%;height:100%;background:var(--bg2);}
.map-pin{font-size:22px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.6));}
.leaflet-popup-content-wrapper{background:var(--bg2);color:var(--text);border:1px solid var(--line);border-radius:10px;}
.leaflet-popup-tip{background:var(--bg2);}
.leaflet-popup-content{font-family:'Cormorant Garamond',serif;font-size:14px;}
.popup-name{color:var(--gold2);font-weight:600;display:block;margin-bottom:6px;}
.popup-btn{border:1px solid var(--gold-dim);background:var(--bg3);color:var(--gold2);border-radius:8px;padding:4px 10px;font-family:'Cormorant Garamond',serif;font-size:13px;cursor:pointer;}

/* mes apps */
.cat-chips{display:flex;gap:8px;padding-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cat-chips::-webkit-scrollbar{display:none;}
.mosaic{display:grid;grid-template-columns:repeat(4,1fr);gap:12px 8px;}
.mosaic-item{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;}
.mosaic-icon{width:56px;height:56px;border-radius:13px;background:var(--bg2);border:1px solid var(--line);}
.mosaic-name{font-size:9px;color:var(--dim);text-align:center;line-height:1.2;font-family:'Cormorant Garamond',serif;}

/* tabbar */
.tabbar{display:flex;flex-shrink:0;border-top:1px solid var(--line);background:var(--bg);padding:8px 0 calc(8px + env(safe-area-inset-bottom));}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;color:var(--dim);font-size:calc(11px * var(--fs));font-family:'Cormorant Garamond',serif;cursor:pointer;}
.tab .ic{font-size:20px;}
.tab.active{color:var(--gold2);}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1 id="appTitle"></h1>
    <div class="header-actions">
      <button class="icon-btn" id="btnSearch">🔍</button>
      <button class="icon-btn" id="btnLang">🇫🇷</button>
    </div>
  </div>

  <div class="search-wrap" id="searchWrap">
    <input type="text" id="searchInput" placeholder="">
    <button class="search-clear" id="searchClear">✕</button>
  </div>

  <div class="chips" id="chipsRow"></div>

  <div class="main" id="main">
    <div class="view active" id="view-list"></div>

    <div class="view" id="view-detail"></div>

    <div class="view" id="view-map">
      <div id="map"></div>
    </div>

    <div class="view" id="view-myapps"></div>
  </div>

  <nav class="tabbar">
    <button class="tab active" id="tabList" data-view="list"><span class="ic">📋</span><span class="lbl"></span></button>
    <button class="tab" id="tabMap" data-view="map"><span class="ic">🗺️</span><span class="lbl"></span></button>
    <button class="tab" id="tabApps" data-view="myapps"><span class="ic">📱</span><span class="lbl"></span></button>
  </nav>
</div>

let activeAppCat = MY_APPS_CAT[0].key;

const STR = {
 title:{fr:"Agences de Presse",en:"News Agencies"},
 list:{fr:"Liste",en:"List"},
 map:{fr:"Carte",en:"Map"},
 myApps:{fr:"Mes Apps",en:"My Apps"},
 search:{fr:"Agence, pays...",en:"Agency, country..."},
 founded:{fr:"Fondation",en:"Founded"},
 status:{fr:"Statut",en:"Status"},
 languages:{fr:"Langues",en:"Languages"},
 showMap:{fr:"Voir sur la carte",en:"Show on map"},
 back:{fr:"Retour",en:"Back"},
 noResults:{fr:"Aucune agence trouvée",en:"No agency found"},
 viewDetail:{fr:"Voir la fiche",en:"View details"},
 logoOnly:{fr:"Logo (pas de photo du siège disponible)",en:"Logo (no headquarters photo available)"}
};
const CONT_EN = {"Europe":"Europe","Asie":"Asia","Moyen-Orient":"Middle East","Afrique":"Africa","Amérique du Nord":"North America","Amérique du Sud":"South America","Océanie":"Oceania"};

/* =========================================================
   ETAT
   ========================================================= */
let lang = 'fr';
let activeContinent = 'all';
let searchQuery = '';
let currentDetailId = null;
let previousView = 'list';
let mapInstance = null;
let mapMarkers = {};

function L_(key){ return STR[key][lang]; }

/* =========================================================
   INIT
   ========================================================= */
function init(){
  applyFontSize();
  document.getElementById('appTitle').textContent = L_('title');
  document.getElementById('btnLang').textContent = lang === 'fr' ? '🇫🇷' : '🇬🇧';
  document.getElementById('searchInput').placeholder = L_('search');
  document.querySelector('#tabList .lbl').textContent = L_('list');
  document.querySelector('#tabMap .lbl').textContent = L_('map');
  document.querySelector('#tabApps .lbl').textContent = L_('myApps');

  renderChips();
  renderList();
  renderMyApps();
  bindEvents();
}

/* =========================================================
   NAVIGATION ENTRE VUES
   ========================================================= */
function switchView(view){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector('.tab[data-view="' + view + '"]');
  if (tab) tab.classList.add('active');

  const main = document.getElementById('main');
  const chips = document.getElementById('chipsRow');
  if (view === 'map'){
    main.classList.add('flush');
    chips.style.display = 'none';
    document.getElementById('searchWrap').classList.remove('active');
    requestAnimationFrame(initOrRefreshMap);
  } else {
    main.classList.remove('flush');
    chips.style.display = (view === 'list') ? 'flex' : 'none';
  }
}

/* =========================================================
   LISTE
   ========================================================= */
function renderChips(){
  const row = document.getElementById('chipsRow');
  row.innerHTML = '';
  CONTINENTS.forEach(c => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (c.key === activeContinent ? ' active' : '');
    chip.textContent = lang === 'fr' ? c.fr : c.en;
    chip.onclick = () => { activeContinent = c.key; renderChips(); renderList(); };
    row.appendChild(chip);
  });
}

/* miniature liste: demande une version 120px a Wikimedia quand possible
   (URLs du type .../thumb/.../960px-Fichier.ext -> .../thumb/.../120px-Fichier.ext) */
function listThumb(url){
  return url.replace('/960px-', '/120px-');
}

function renderList(){
  const container = document.getElementById('view-list');
  const q = searchQuery.trim().toLowerCase();

  const items = DATA.filter(d => {
    if (activeContinent !== 'all' && d.cont !== activeContinent) return false;
    if (!q) return true;
    const hay = (d.nf + ' ' + d.ne + ' ' + d.pf + ' ' + d.pe + ' ' + d.ville).toLowerCase();
    return hay.includes(q);
  });

  if (items.length === 0){
    container.innerHTML = '<div class="empty">' + L_('noResults') + '</div>';
    return;
  }

  container.innerHTML = items.map(d => {
    const name = lang === 'fr' ? d.nf : d.ne;
    const country = lang === 'fr' ? d.pf : d.pe;
    const flag = FLAGS[d.pf] || '🌐';
    const thumb = d.wl
      ? '<img class="card-thumb" src="' + listThumb(d.wl) + '" alt="" loading="lazy">'
      : '<div class="card-thumb-ph">📰</div>';
    return '<div class="card" onclick="showDetail(' + d.id + ')">' +
      '<div class="card-media">' + thumb + '<div class="card-flag">' + flag + '</div></div>' +
      '<div class="card-info">' +
        '<div class="card-name">' + name + '</div>' +
        '<div class="card-meta">' + country + ' · ' + d.ville + ' · ' + d.fond + '</div>' +
      '</div>' +
      '<div class="card-arrow">›</div>' +
    '</div>';
  }).join('');
}

/* =========================================================
   DETAIL
   ========================================================= */
function showDetail(id, from){
  previousView = from || 'list';
  currentDetailId = id;
  buildDetail();
  switchView('detail');
}

function backFromDetail(){
  switchView(previousView);
}

/* construit le DOM une seule fois */
function buildDetail(){
  const container = document.getElementById('view-detail');
  const d = DATA.find(x => x.id === currentDetailId);
  if (!d) return;

  container.innerHTML =
    '<button class="back-btn" onclick="backFromDetail()">‹ <span id="dBack"></span></button>' +
    '<div class="detail-img" id="dImg"></div>' +
    '<div class="img-note" id="dImgNote"></div>' +
    '<div class="detail-title" id="dTitle"></div>' +
    '<div class="detail-sub" id="dSub"></div>' +
    '<div class="detail-grid">' +
      '<div class="detail-stat"><div class="lbl" id="dLbl1"></div><div class="val" id="dVal1"></div></div>' +
      '<div class="detail-stat"><div class="lbl" id="dLbl2"></div><div class="val" id="dVal2"></div></div>' +
      '<div class="detail-stat"><div class="lbl" id="dLbl3"></div><div class="val" id="dVal3"></div></div>' +
      '<div class="detail-stat"><div class="lbl" id="dLbl4"></div><div class="val" id="dVal4"></div></div>' +
    '</div>' +
    '<div class="detail-fact" id="dFact"></div>' +
    '<button class="detail-map-btn" id="dMapBtn" onclick="showOnMap(' + d.id + ')"></button>';

  const img = document.getElementById('dImg');
  if (d.wb){
    img.innerHTML = '<img src="' + d.wb + '" alt="">';
  } else if (d.wl){
    img.innerHTML = '<img src="' + d.wl + '" alt="">';
  } else {
    img.innerHTML = '<div class="ph">📰</div>';
  }

  updateDetailTexts();
}

/* ne touche qu'aux textes — jamais à renderDetail/buildDetail */
function updateDetailTexts(){
  const d = DATA.find(x => x.id === currentDetailId);
  if (!d) return;

  document.getElementById('dBack').textContent = L_('back');
  document.getElementById('dImgNote').textContent = d.wb ? '' : (d.wl ? L_('logoOnly') : 'wiki: ' + d.wiki);
  document.getElementById('dTitle').textContent = lang === 'fr' ? d.nf : d.ne;
  document.getElementById('dSub').textContent = (lang === 'fr' ? d.pf : d.pe) + ' · ' + d.ville;

  document.getElementById('dLbl1').textContent = L_('founded');
  document.getElementById('dVal1').textContent = d.fond;

  document.getElementById('dLbl2').textContent = L_('status');
  document.getElementById('dVal2').textContent = lang === 'fr' ? d.sf : d.se;

  document.getElementById('dLbl3').textContent = L_('languages');
  document.getElementById('dVal3').textContent = d.lang;

  document.getElementById('dLbl4').textContent = lang === 'fr' ? 'Continent' : 'Continent';
  document.getElementById('dVal4').textContent = lang === 'fr' ? d.cont : (CONT_EN[d.cont] || d.cont);

  document.getElementById('dFact').textContent = lang === 'fr' ? d.ff : d.fe;
  document.getElementById('dMapBtn').textContent = '🗺️ ' + L_('showMap');
}

function showOnMap(id){
  switchView('map');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tabMap').classList.add('active');
  requestAnimationFrame(() => {
    initOrRefreshMap();
    const d = DATA.find(x => x.id === id);
    if (d && mapInstance){
      mapInstance.setView([d.lat, d.lng], 6);
      if (mapMarkers[id]) mapMarkers[id].openPopup();
    }
  });
}

/* =========================================================
   CARTE
   ========================================================= */
function initOrRefreshMap(){
  if (!mapInstance){
    mapInstance = L.map('map', {zoomControl:true}).setView([25, 10], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 18
    }).addTo(mapInstance);

    const icon = L.divIcon({html:'<div class="map-pin">📰</div>', className:'', iconSize:[26,26], iconAnchor:[13,22], popupAnchor:[0,-20]});

    DATA.forEach(d => {
      const marker = L.marker([d.lat, d.lng], {icon: icon}).addTo(mapInstance);
      marker.bindPopup(buildPopup(d));
      mapMarkers[d.id] = marker;
    });
  }
  setTimeout(() => mapInstance.invalidateSize(), 50);
}

function buildPopup(d){
  const name = lang === 'fr' ? d.nf : d.ne;
  return '<span class="popup-name">' + name + '</span>' +
    '<button class="popup-btn" onclick="showDetail(' + d.id + ',\'map\')">' + L_('viewDetail') + '</button>';
}

function refreshMapPopups(){
  if (!mapInstance) return;
  DATA.forEach(d => {
    const m = mapMarkers[d.id];
    if (m) m.setPopupContent(buildPopup(d));
  });
}

/* =========================================================
   MES APPS
   ========================================================= */
function renderMyApps(){
  const container = document.getElementById('view-myapps');
  container.innerHTML = '<div class="cat-chips" id="appCatChips"></div><div class="mosaic" id="appsGrid"></div>';
  renderAppCatChips();
  renderAppsGrid();
}

function renderAppCatChips(){
  const row = document.getElementById('appCatChips');
  if (!row) return;
  row.innerHTML = '';
  MY_APPS_CAT.forEach(c => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (c.key === activeAppCat ? ' active' : '');
    chip.textContent = lang === 'fr' ? c.fr : c.en;
    chip.onclick = () => { activeAppCat = c.key; renderAppCatChips(); renderAppsGrid(); };
    row.appendChild(chip);
  });
}

function renderAppsGrid(){
  const grid = document.getElementById('appsGrid');
  const apps = activeAppCat === 'all'
    ? Object.values(MY_APPS).flat()
    : (MY_APPS[activeAppCat] || []);
  grid.innerHTML = apps.map((app, i) =>
    '<a class="mosaic-item" href="https://apps.apple.com/app/id' + app.id + '" target="_blank">' +
      '<img class="mosaic-icon" id="mi' + i + '" alt="">' +
      '<div class="mosaic-name">' + app.name + '</div>' +
    '</a>'
  ).join('');

  apps.forEach((app, i) => loadItunesIcon(app.id, 'mi' + i));
}

/* JSONP iTunes — pattern habituel */
function loadItunesIcon(numId, imgId){
  const cb = 'itcb' + numId + '_' + imgId;
  window[cb] = function(d){
    const img = document.getElementById(imgId);
    if (img && d.results && d.results[0]) img.src = d.results[0].artworkUrl60;
  };
  const s = document.createElement('script');
  s.src = 'https://itunes.apple.com/lookup?id=' + numId + '&callback=' + cb;
  document.body.appendChild(s);
}

/* =========================================================
   LANGUE
   ========================================================= */
function setLang(l){
  if (lang === l) return;
  lang = l;
  document.getElementById('btnLang').textContent = lang === 'fr' ? '🇫🇷' : '🇬🇧';
  document.getElementById('appTitle').textContent = L_('title');
  document.getElementById('searchInput').placeholder = L_('search');
  document.querySelector('#tabList .lbl').textContent = L_('list');
  document.querySelector('#tabMap .lbl').textContent = L_('map');
  document.querySelector('#tabApps .lbl').textContent = L_('myApps');

  renderChips();
  renderList();
  renderAppCatChips();
  refreshMapPopups();

  if (currentDetailId !== null) updateDetailTexts();
}

/* =========================================================
   TAILLE DE POLICE — automatique, plus de boutons A−/A+
   ========================================================= */
const isIpad = /iPad/.test(navigator.userAgent) ||
  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) ||
  window.innerWidth >= 768;
const fontSize = isIpad ? 1.5 : 1;
function applyFontSize(){
  document.documentElement.style.setProperty('--fs', fontSize);
}

/* =========================================================
   EVENEMENTS
   ========================================================= */
function bindEvents(){
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchView(tab.dataset.view));
  });

  document.getElementById('btnLang').addEventListener('click', () => setLang(lang === 'fr' ? 'en' : 'fr'));

  const searchWrap = document.getElementById('searchWrap');
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');

  document.getElementById('btnSearch').addEventListener('click', () => {
    searchWrap.classList.toggle('active');
    if (searchWrap.classList.contains('active')) searchInput.focus();
  });

  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value;
    searchClear.style.display = searchQuery ? 'flex' : 'none';
    renderList();
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchQuery = '';
    searchClear.style.display = 'none';
    renderList();
    searchInput.focus();
  });
}

init();
</script>
